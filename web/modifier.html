<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Modifier un point</title>
</head>
<body>

  <h1>Modifier un point</h1>
  <p><a href="index.html">← Retour au menu</a></p>

  <form action="http://192.168.2.117:5000/modifier_point" method="get">

    <label>Nom du parcours :</label><br>
    <input type="text" name="nom_parcours" required><br><br>

    <label>Ordre du point :</label><br>
    <input type="number" name="ordre" required><br><br>

    <label>Nouvelle latitude :</label><br>
    <input type="number" step="any" name="latitude" required><br><br>

    <label>Nouvelle longitude :</label><br>
    <input type="number" step="any" name="longitude" required><br><br>

    <input type="submit" value="Modifier le point">

  </form>

</body>
</html>
